name: CI & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # -----------------------
  # Continuous Integration: formatting, tests, static analysis
  # -----------------------
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Check formatting
        run: mvn -B -U spotless:check

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build (static analysis, tests, package)
        run: mvn -B -U verify

  # -----------------------
  # Tag the current commit with the next version
  # -----------------------
  bump-version:
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Compute next version
        id: compute
        run: |
          POM=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          BASE=${POM%-SNAPSHOT}
          IFS='.' read -r MAJOR MINOR _ <<< "$BASE"
          LATEST=$(git tag -l "v${MAJOR}.${MINOR}.*" --sort=-v:refname | head -n 1)
          if [ -z "$LATEST" ]; then
            VERSION="$BASE"
          else
            PATCH=${LATEST##*.}
            VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Tag and push
        run: |
          git tag "v${{ steps.compute.outputs.version }}"
          git push origin "v${{ steps.compute.outputs.version }}"

  # -----------------------
  # Build platform packages
  # -----------------------
  build:
    needs: bump-version
    strategy:
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    env:
      APP_NAME: MouseMover
      MAIN_CLASS: io.github.cptimario.mousemover.cli.Launcher
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.bump-version.outputs.version }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Build with Maven
        run: mvn -B clean package

      - name: Find shaded JAR
        id: jar
        shell: bash
        run: |
          JAR=$(ls target/*jar | grep -v original | head -n 1)
          echo "jar=$JAR" >> $GITHUB_OUTPUT

      # macOS (.dmg)
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          jpackage \
            --name "$APP_NAME" \
            --app-version "${{ needs.bump-version.outputs.version }}" \
            --input target/ \
            --main-jar "$(basename ${{ steps.jar.outputs.jar }})" \
            --main-class "$MAIN_CLASS" \
            --type dmg \
            --icon src/main/resources/icon.icns \
            --mac-package-name "MouseMover" \
            --arguments "--idle 30 --interval 5"

      - name: Build mac native (dylib)
        if: runner.os == 'macOS'
        working-directory: native-src/mac
        run: |
          chmod +x build-mac.sh
          ./build-mac.sh
          sha256sum libidle_time_mac.dylib > libidle_time_mac.dylib.sha256
        env:
          LC_ALL: C.UTF-8

      # Windows (.exe)
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          jpackage \
            --name "$APP_NAME" \
            --app-version "${{ needs.bump-version.outputs.version }}" \
            --input target \
            --main-jar "$(basename '${{ steps.jar.outputs.jar }}')" \
            --main-class "$MAIN_CLASS" \
            --type exe \
            --icon src/main/resources/icon.ico \
            --win-console \
            --arguments "--idle 30 --interval 5"

      - name: Build windows native (dll)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: native-src/win
        run: |
          chmod +x build-win.sh || true
          ./build-win.sh
          sha256sum idle_time_win.dll > idle_time_win.dll.sha256

      # Linux (.deb)
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          jpackage \
            --name "$APP_NAME" \
            --app-version "${{ needs.bump-version.outputs.version }}" \
            --input target/ \
            --main-jar "$(basename ${{ steps.jar.outputs.jar }})" \
            --main-class "$MAIN_CLASS" \
            --type deb \
            --arguments "--idle 30 --interval 5"

      - name: Rename artifacts
        shell: bash
        run: |
          VERSION=${{ needs.bump-version.outputs.version }}
          OS=${{ runner.os }}
          for f in *.dmg *.exe *.deb libidle_time_mac.dylib idle_time_win.dll *.sha256 *.sha256.sig; do
            [ -f "$f" ] || continue
            mv "$f" "${APP_NAME}-${VERSION}-${OS}.${f##*.}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MouseMover-${{ runner.os }}
          path: |
            *.dmg
            *.exe
            *.deb
            libidle_time_mac.dylib
            idle_time_win.dll
            *.sha256
            *.sha256.sig

      - name: Upload versionless JAR
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: MouseMover-jar
          path: target/mouse-mover.jar

  # -----------------------
  # Create GitHub Release
  # -----------------------
  release:
    needs: [ build, bump-version ]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.bump-version.outputs.version }}
          files: |
            **/*.dmg
            **/*.exe
            **/*.deb
            MouseMover-jar/mouse-mover.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

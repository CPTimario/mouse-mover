name: Build native libraries

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build macOS native library
        working-directory: native-src/mac
        run: |
          chmod +x build-mac.sh
          ./build-mac.sh

      - name: Generate checksum
        working-directory: native-src/mac
        run: |
          sha256sum libidle_time_mac.dylib > libidle_time_mac.dylib.sha256
        env:
          LC_ALL: C.UTF-8

      - name: Sign checksum (optional)
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" > private.key
          gpg --batch --import private.key
          gpg --batch --yes --detach-sign --output libidle_time_mac.dylib.sha256.sig libidle_time_mac.dylib.sha256

      - name: Build Java (for smoke test)
        run: mvn -DskipTests package

      - name: Smoke test macOS native
        run: |
          cat > NativeSmokeTest.java <<'JAVA'
          public class NativeSmokeTest {
              public static void main(String[] args) {
                  try {
                      System.load("${{ github.workspace }}/native-src/mac/libidle_time_mac.dylib");
                      io.github.cptimario.mousemover.MacOSIdleTimeProvider p = new io.github.cptimario.mousemover.MacOSIdleTimeProvider();
                      long s = p.getIdleTimeSeconds();
                      System.out.println("idleSeconds="+s);
                      if (s < 0) System.exit(2);
                  } catch (Throwable t) {
                      t.printStackTrace();
                      System.exit(1);
                  }
              }
          }
          javac -cp target/classes NativeSmokeTest.java
          java -cp target/classes:. NativeSmokeTest

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: libidle_time_mac.dylib
          path: native-src/mac/libidle_time_mac.dylib

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build Windows native library (MinGW)
        working-directory: native-src/win
        shell: bash
        run: |
          chmod +x build-win.sh || true
          ./build-win.sh

      - name: Generate checksum
        working-directory: native-src/win
        shell: bash
        run: |
          sha256sum idle_time_win.dll > idle_time_win.dll.sha256

      - name: Sign checksum (optional)
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        shell: bash
        run: |
          echo "$GPG_PRIVATE_KEY" > private.key
          gpg --batch --import private.key
          gpg --batch --yes --detach-sign --output idle_time_win.dll.sha256.sig idle_time_win.dll.sha256

      - name: Build Java (for smoke test)
        run: mvn -DskipTests package

      - name: Smoke test Windows native
        shell: bash
        run: |
          cat > NativeSmokeTest.java <<'JAVA'
          public class NativeSmokeTest {
              public static void main(String[] args) {
                  try {
                      System.load("${{ github.workspace }}\\native-src\\win\\idle_time_win.dll");
                      io.github.cptimario.mousemover.WindowsIdleTimeProvider p = new io.github.cptimario.mousemover.WindowsIdleTimeProvider();
                      long s = p.getIdleTimeSeconds();
                      System.out.println("idleSeconds="+s);
                      if (s < 0) System.exit(2);
                  } catch (Throwable t) {
                      t.printStackTrace();
                      System.exit(1);
                  }
              }
          }
          javac -cp target/classes NativeSmokeTest.java
          java -cp target/classes:. NativeSmokeTest

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: idle_time_win.dll
          path: native-src/win/idle_time_win.dll

  package:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: libidle_time_mac.dylib

      - name: Download win artifact
        uses: actions/download-artifact@v4
        with:
          name: idle_time_win.dll

      - name: Prepare native resources
        run: |
          mkdir -p src/main/resources/native
          # downloaded artifacts are placed in workspace root by download-artifact
          if [ -f libidle_time_mac.dylib ]; then mv libidle_time_mac.dylib src/main/resources/native/; fi
          if [ -f idle_time_win.dll ]; then mv idle_time_win.dll src/main/resources/native/; fi
          if [ -f libidle_time_mac.dylib.sha256 ]; then mv libidle_time_mac.dylib.sha256 src/main/resources/native/; fi
          if [ -f idle_time_win.dll.sha256 ]; then mv idle_time_win.dll.sha256 src/main/resources/native/; fi
          if [ -f libidle_time_mac.dylib.sha256.sig ]; then mv libidle_time_mac.dylib.sha256.sig src/main/resources/native/; fi
          if [ -f idle_time_win.dll.sha256.sig ]; then mv idle_time_win.dll.sha256.sig src/main/resources/native/; fi

      - name: Generate CHECKSUMS.txt for packaging
        run: |
          cd src/main/resources/native
          echo "" > CHECKSUMS.txt
          for f in *.sha256 2>/dev/null; do
            if [ -f "$f" ]; then
              # normalize "<hash>  filename" -> keep as-is
              cat "$f" >> CHECKSUMS.txt
            fi
          done

      - name: Build packaged jar with natives
        run: mvn -DskipTests package

      - name: Upload packaged jar
        uses: actions/upload-artifact@v4
        with:
          name: mouse-mover-package
          path: target/*.jar


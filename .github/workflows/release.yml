name: Build & Release MouseMover

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]

    runs-on: ${{ matrix.os }}

    env:
      APP_NAME: MouseMover
      MAIN_CLASS: io.github.cptimario.mousemover.MouseMover

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build with Maven
        run: mvn -B clean package

      - name: Find shaded JAR
        id: jar
        shell: bash
        run: |
          JAR=$(ls target/*jar | grep -v original | head -n 1)
          echo "jar=$JAR" >> $GITHUB_OUTPUT

      # -----------------------
      # macOS (.dmg)
      # -----------------------
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          jpackage \
            --name "$APP_NAME" \
            --app-version "${{ steps.version.outputs.version }}" \
            --input target/ \
            --main-jar "$(basename ${{ steps.jar.outputs.jar }})" \
            --main-class "$MAIN_CLASS" \
            --type dmg \
            --icon src/main/resources/icon.icns \
            --mac-package-name "MouseMover" \
            --arguments "--idle 30 --interval 5"

      # -----------------------
      # Windows (.exe)
      # -----------------------
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          jpackage \
            --name "$APP_NAME" \
            --app-version "${{ steps.version.outputs.version }}" \
            --input target \
            --main-jar "$(basename '${{ steps.jar.outputs.jar }}')" \
            --main-class "$MAIN_CLASS" \
            --type exe \
            --icon src/main/resources/icon.ico \
            --win-console \
            --arguments "--idle 30 --interval 5"

      # -----------------------
      # Linux (.deb)
      # -----------------------
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          jpackage \
            --name "$APP_NAME" \
            --app-version "${{ steps.version.outputs.version }}" \
            --input target/ \
            --main-jar "$(basename ${{ steps.jar.outputs.jar }})" \
            --main-class "$MAIN_CLASS" \
            --type deb \
            --arguments "--idle 30 --interval 5"

      # -----------------------
      # Rename outputs for clarity
      # -----------------------
      - name: Rename artifacts
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          OS=${{ runner.os }}

          for f in *.dmg *.exe *.deb; do
            [ -f "$f" ] || continue
            mv "$f" "${APP_NAME}-${VERSION}-${OS}.${f##*.}"
          done

      # -----------------------
      # Upload artifacts (for debugging too)
      # -----------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MouseMover-${{ runner.os }}
          path: |
            *.dmg
            *.exe
            *.deb

  # -----------------------
  # Create GitHub Release
  # -----------------------
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.dmg
            **/*.exe
            **/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}